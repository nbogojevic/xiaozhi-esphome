esphome:
  name: "${devicename}"
  comment: "${devicename} heater"
  project:
    name: "nbogojevic.esp32heater"
    version: "1.1"
  includes:
    - common/heater_esp32.h
  on_boot:
    priority: 600
    then:
      - script.execute: screen_saver_script
      - script.execute: heat_on_power

esp32:
  board: "${board_type}"
  framework:
    type: esp-idf

# Enable logging
logger:
  level: "${log_level}"
  logs:
    sensor: INFO
    ntc: INFO
    resistance: INFO

# Enable Home Assistant API
api:

safe_mode:
  num_attempts: 100
  reboot_timeout: 15min
  disabled: true

# Enable OTA
ota:
  - platform: esphome

time:
  - platform: homeassistant
    id: homeassistant_time
    on_time_sync:
      then:
        - logger.log: "Synchronized system clock"

switch:
  # Solid-state switch pin
  - platform: gpio
    pin:
      # If solid-state switch is driven by high voltage
      number: ${solid_state_pin}
    id: heater_switch
    restore_mode: ALWAYS_OFF
    name: "${devicename} Heater"
  - platform: restart
    name: "${devicename} Restart"
    id: reboot
    disabled_by_default: true

i2c:
  sda: ${sda_pin}
  scl: ${scl_pin}
  frequency: 400kHz

