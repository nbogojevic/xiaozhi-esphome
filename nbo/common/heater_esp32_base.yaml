select:
  - platform: template
    name: "${devicename} Temperature Source"
    id: temperature_source
    optimistic: true
    icon: "mdi:eye"
    options:
      - Intake
      - DHT
      - Home Assistant
    initial_option: ${initial_source}
    restore_value: true

# Information sensors
text_sensor:
  - platform: template
    name: "${devicename} Source State"
    id: source_state
    icon: "mdi:information-outline"

climate:
  - platform: thermostat
    name: "${devicename} Heating"
    id: heater
    sensor: ambient_temperature
    default_preset: Home
    on_boot_restore_from: memory
    min_heating_off_time: 30s
    min_heating_run_time: 10s
    set_point_minimum_differential: 1 °C
    min_idle_time: 10s
    heat_action:
      - switch.turn_on: heater_switch
      - binary_sensor.template.publish:
          id: safety_stop
          state: OFF
    idle_action:
      - switch.turn_off: heater_switch
      - binary_sensor.template.publish:
          id: safety_stop
          state: OFF
    preset:
      - name: Home
        mode: heat
        default_target_temperature_low: ${default_target_temperature}

script:
  - id: screen_saver_script
    then:
      - delay: 5min
  - id: heat_on_power
    then:
      - delay: 1min
      - logger.log: "Initial setup"
      - if:
          condition:
            time.has_time:
          then:
            - if:
                condition:
                  - lambda: |-
                      auto month = id(homeassistant_time).now().month;
                      return month >= 10 || month <= 4;
                then:
                  - logger.log: "HEAT on boot in cold season"
                  - climate.control:
                      id: heater
                      mode: "HEAT"
                else:
                  - logger.log: "OFF on boot in warm season"
                  - climate.control:
                      id: heater
                      mode: "OFF"
          else:
            - logger.log: "HEAT on boot by default"
            - climate.control:
                id: heater
                mode: HEAT
