### USING LOCAL MODULES

packages: # Local
 core: !include localtest/core_ball.yaml
 hw:   !include localtest/HW/ball_v2_hw.yaml

## ENABLE / DISABLE WAKE WORDS ## IF LOW ON MEMORY, USE LESS WAKE WORDS ##########################################################################

micro_wake_word:
  id: mww
  models:
    - okay_nabu


