esp32:
  board: esp32-p4-evboard
  flash_size: 16Mb
  cpu_frequency: 360MHz
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: yes
    sdkconfig_options:
      CONFIG_SPIRAM_XIP_FROM_PSRAM: y

psram:
  speed: 200MHz

esp_ldo:
  - channel: 3
    voltage: 2.5V

esp32_hosted:
  active_high: true
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Guitron WIFI"
    password: !secret portal_password

lvgl:

touchscreen:
  - platform: gt911
    id: my_touchscreen
    display: main_display
    transform:
      swap_xy: false
      mirror_x: true
      mirror_y: true

output:
  - platform: ledc
    id: backlight_output
    pin: GPIO23
    frequency: 100Hz
    inverted: false
    min_power: 0.0
    max_power: 0.8

light:
  - platform: monochromatic
    id: Sled
    name: Screen
    icon: mdi:television
    entity_category: config
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 250ms

display:
  - platform: mipi_dsi
    id: main_display
    model: JC4880P443
    update_interval: never
    auto_clear_enabled: false
    rotation: ${rotate_display}
    dimensions:
        width: 480
        height: 800