# cspell:ignore screenheight screenwidth imagepath imagemodel startupsound imagewidth imageheight starrysky

select:
  - platform: template
    entity_category: config
    name: "Clock Style"
    id: clock_style
    icon: "mdi:clock-digital"
    optimistic: true
    restore_value: true
    options:
      - Default
      - Analog
    initial_option: Default
    on_value:
      - if:
          condition:
            lambda: return id(show_clock);
          then:
            - script.execute: show_clock_page

script:
  - id: show_clock_page
    then:
      - lambda: |-
          const std::string sel = id(clock_style).current_option();
          if (sel == "Default") {
            id(main_display).show_page(default_clock);
          } else if (sel == "Analog") {
            id(main_display).show_page(analog_clock);
          } else {
            id(main_display).show_page(default_clock);
          }
          id(main_display).update();

  - id: swipe_left_action   # next clock style
    then:
      - lambda: |-
          static const char* const opts[] = {
            "Default","Analog"
          };
          const int N = sizeof(opts)/sizeof(opts[0]);
          std::string cur = id(clock_style).current_option().c_str();
          int idx = 0;
          for (int i = 0; i < N; i++) if (cur == opts[i]) { idx = i; break; }
          int next = (idx + 1) % N;
          id(clock_style).publish_state(opts[next]);

  - id: swipe_right_action  # previous clock style
    then:
      - lambda: |-
          static const char* const opts[] = {
            "Default","Analog"
          };
          const int N = sizeof(opts)/sizeof(opts[0]);
          std::string cur = id(clock_style).current_option().c_str();
          int idx = 0;
          for (int i = 0; i < N; i++) if (cur == opts[i]) { idx = i; break; }
          int prev = (idx - 1 + N) % N;
          id(clock_style).publish_state(opts[prev]);

# NBO Do nothing as no wallpaper change available 
  - id: swipe_up_action     # next wallpaper (cycle)
    then:
      - lambda: |-
          {}

  - id: swipe_down_action   # toggle battery widget
    then:
      - switch.toggle: show_battery_status
      - component.update: main_display
