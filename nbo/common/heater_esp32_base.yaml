display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    id: screen
    update_interval: 5s
    contrast: 10%
    address: 0x3C
    lambda: return paint_display(it);

esp32_touch:
  setup_mode: false

binary_sensor:
  # Up
  - platform: esp32_touch
    name: "${devicename} Touch Pad"
    pin: ${touch_pin}
    threshold: 1000
    on_press:
      then:
        - if:
            condition:
              - script.is_running: screen_saver_script
            then:
              - script.stop: screen_saver_script
              - script.execute: screen_saver_script
              - climate.control:
                  id: heater
                  mode: !lambda |-
                    if (id(heater).mode == climate::CLIMATE_MODE_HEAT) {
                      if (id(heater).target_temperature >= id(heater).get_traits().get_visual_max_temperature()) {
                        return climate::CLIMATE_MODE_OFF;
                      }
                    }
                    return climate::CLIMATE_MODE_HEAT;
                  target_temperature: !lambda |-
                    if (id(heater).mode == climate::CLIMATE_MODE_HEAT) {
                      if (id(heater).target_temperature < id(heater).get_traits().get_visual_max_temperature()) {
                        return id(heater).target_temperature + 1;
                      } 
                    }
                    return id(heater).get_traits().get_visual_min_temperature();
              - component.update: screen
            else:
              - script.execute: screen_saver_script
              - component.update: screen
  - platform: template
    name: "${devicename} Safety Stop"
    id: safety_stop
    device_class: problem

sensor:
  # Measure thermistor resistance:
  - platform: adc
    id: source_sensor
    pin: ${thermistor_pin}
    name: "${devicename} Thermistor Current"
    update_interval: 2s
    filters:
      - exponential_moving_average:
          alpha: 0.1
          send_every: 5
    disabled_by_default: true
  - platform: resistance
    id: resistance_sensor
    sensor: source_sensor
    configuration: DOWNSTREAM
    resistor: 330kOhm
    name: "${devicename} Thermistor Resistance"
    disabled_by_default: true
  - platform: ntc
    sensor: resistance_sensor
    calibration:
      # - 112kOhm -> 20°C
      - 100kOhm -> 25°C
      - 162kOhm -> 15°C
      - 64kOhm -> 35°C
    name: "${devicename} Intake Temperature"
    id: adc_temperature
    icon: "mdi:thermometer-chevron-down"
    accuracy_decimals: 0
    filters:
      - lambda: |-
          if (ADC_MIN_VALUE >= x) return ADC_MIN_VALUE;
          if (x >= ADC_MAX_VALUE) return ADC_MAX_VALUE;
          return x;

  # Digital temperature sensor
  - platform: dht
    pin: ${dht_pin}
    temperature:
      name: "${devicename} DHT Temperature"
      id: dht_temperature
      icon: "mdi:thermometer-chevron-up"
      accuracy_decimals: 0
      on_value:
        - if:
            condition:
              and:
                - lambda: return x >= ${overheat_stop_above};
                - switch.is_on: heater_switch
            then:
              - logger.log: "!! DHT too hot !!"
              - switch.turn_off: heater_switch
              - binary_sensor.template.publish:
                  id: safety_stop
                  state: ON
            else:
              - if:
                  condition:
                    and:
                      - lambda: |-
                          return x <= ${overheat_start_below}
                            && id(heater).mode == climate::CLIMATE_MODE_HEAT
                            && id(heater).action == climate::CLIMATE_ACTION_HEATING;
                      - switch.is_off: heater_switch
                  then:
                    - logger.log: "DHT cooled down"
                    - switch.turn_on: heater_switch
                    - binary_sensor.template.publish:
                        id: safety_stop
                        state: OFF

    humidity:
      name: "${devicename} DHT Humidity"
      id: dht_humidity
    update_interval: 30s
  - platform: template
    name: "${devicename} Ambient Temperature"
    id: ambient_temperature
    icon: "mdi:thermometer"
    unit_of_measurement: "°C"
    accuracy_decimals: 0
    lambda: |-
      // Check if it is not overheating
      auto source = id(temperature_source).state;
      if (source == HOME_ASSISTANT_SOURCE) {
        if (id(homeassistant_temperature).has_state() && id(homeassistant_temperature).state != NAN && id(homeassistant_temperature).state < 50) {
          id(source_state).publish_state(STATUS_OK);
          return floor(id(homeassistant_temperature).state);
        }
      }
      if (source == INTAKE_SOURCE && id(adc_temperature).has_state()) {
        id(source_state).publish_state(STATUS_OK);
        return floor(id(adc_temperature).state);
      }
      if (source == DHT_SOURCE && id(dht_temperature).has_state()) {
        id(source_state).publish_state(STATUS_OK);
        return floor(id(dht_temperature).state);
      }
      // Fallback
      if (id(adc_temperature).has_state()) {
        if (id(dht_temperature).has_state()) {
          auto adc = floor(id(adc_temperature).state);
          auto dht = floor(id(dht_temperature).state);
          id(source_state).publish_state(STATUS_MIX_FALLBACK);
          return floor((adc+dht)/2.0);
        }
        id(source_state).publish_state(STATUS_INTAKE_FALLBACK);
        return floor(id(adc_temperature).state);
      }
      else if (id(dht_temperature).has_state()) {
        id(source_state).publish_state(STATUS_DHT_FALLBACK);
        return floor(id(dht_temperature).state);
      }
      id(source_state).publish_state(STATUS_SOURCE_ERROR);
      return {};
  - platform: homeassistant
    name: "Temperature Sensor From Home Assistant"
    entity_id: ${homeassistant_sensor}
    id: homeassistant_temperature
  - platform: internal_temperature
    name: "${devicename} Internal Temperature"
    id: internal_chip_temperature
